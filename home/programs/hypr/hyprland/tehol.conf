################
### MONITORS ###
################

$mon1=desc:Tianma Microelectronics Ltd. TL145MDXP02

monitor=$mon1,3072x1920@120.00Hz,0x0,1.5

##############################
### WINDOWS AND WORKSPACES ###
##############################

workspace=1, monitor:$mon1, default:true #, on-created-empty: exec slack --enable-features=UseOzonePlatform --ozone-platform=wayland
workspace=9, monitor:$mon1, on-created-empty: wezterm start spotify_player

#############
### INPUT ###
#############

input {
  kb_layout = us
  kb_variant =
  kb_model =
  kb_options = ctrl:nocaps
  kb_rules =

  follow_mouse = 1

  sensitivity = 0.2 # -1.0 - 1.0, 0 means no modification.

  touchpad {
      natural_scroll = true
      scroll_factor = 0.15
      clickfinger_behavior = true
  }
  accel_profile = flat
}
