if [[ -r "''${XDG_CACHE_HOME:-$HOME/.cache}/p10k-instant-prompt-''${(%):-%n}.zsh" ]]; then
  source "''${XDG_CACHE_HOME:-$HOME/.cache}/p10k-instant-prompt-''${(%):-%n}.zsh"
fi

local lightgrey='#a89984'
local grey='#928374'
local red='#ea6962'
local yellow='#d8a657'
local blue='#7daea3'
local magenta='#d3869b'
local aqua='#89b482'
local white='#ddc7a1'
local green='#a9b665'
local orange='#e78a4e'

bindkey -v # Enables vi mode for zsh

export TERM="xterm-256color"
export EDITOR="nvim"
export VISUAL="nvim"
export LANG=en_AU.UTF-8
export ZSHPLUGINS=$HOME/.zsh/plugins

source $ZSHPLUGINS/powerlevel10k/powerlevel10k.zsh-theme
source $ZSHPLUGINS/custom/.p10k.zsh
source $ZSHPLUGINS/zsh-autocomplete/zsh-autocomplete.plugin.zsh
source $ZSHPLUGINS/zsh-autosuggestions/zsh-autosuggestions.zsh
source $ZSHPLUGINS/F-Sy-H/F-Sy-H.plugin.zsh
source $ZSHPLUGINS/zsh-vi-mode/zsh-vi-mode.plugin.zsh
source $ZSHPLUGINS/zsh-nix-shell/nix-shell.plugin.zsh

zmodload zsh/complist
autoload -U compinit; compinit -u

_comp_options+=(globdots)

zstyle ':completion:*' completer _extensions _complete _approximate 
zstyle ':completion:*' use-cache on
zstyle ':completion:*' cache-path "$HOME/zsh/.zcompcache"
zstyle ':completion:*' menu select

zstyle ':completion:*:*:*:*:descriptions' format "%F{green}-- %d --%f"
zstyle ':completion:*:*:*:*:corrections' format '%F{yellow}!- %d (errors: %e) -!%f'
zstyle ':completion:*:*:*:*:messages' format '%F{purple}-- %d --%f'
zstyle ':completion:*:*:*:*:warnings' format '%F{red}-- no matches found --%f'
zstyle ':completion:*' group-name
zstyle ':completion:*' matcher-list 'm:{a-zA-Z}={A-Za-z}' 'r:|[._-]=* r:|=*' 'l:|=* r:|=*'
zstyle ':completion:*' keep-prefix
zstyle ':completion:*:*:-command-:*:*' group-order aliases builtins functions commands
zstyle ':completion:*:default' list-colors ${(s.:.)LS_COLORS}
zstyle ':autocomplete:*' add_space '*'
zstyle ':autocomplete:*' delay 0.5

setopt AUTO_LIST
setopt COMPLETE_IN_WORD
setopt MENU_COMPLETE
unsetopt PATH_DIRS

bindkey -M menuselect 'h' vi-backward-char
bindkey -M menuselect 'k' vi-up-line-or-history
bindkey -M menuselect 'j' vi-down-line-or-history
bindkey -M menuselect 'l' vi-forward-char
bindkey '^I' menu-select
bindkey "$terminfo[kcbt]" menu-select
bindkey -M menuselect '^I' menu-complete
bindkey -M menuselect "$terminfo[kcbt]" reverse-menu-complete
bindkey -M menuselect '^[[D' .backward-char '^[OD' .backward-char
bindkey -M menuselect '^[[C' .forward-char '^[OC' .forward-char
bindkey -M menuselect '^M' .accept-line
bindkey '^H' backward-delete-word
bindkey -M menuselect '^?' backward-delete-line

ZSH_AUTOSUGGEST_HIGHLIGHT_STYLE="fg=$lightgrey"
bindkey '^ ' autosuggest-accept
ZSH_AUTOSUGGEST_STRATEGY=(history)
ZSH_AUTOSUGGEST_CLEAR_WIDGETS+=(menu-select menu-complete reverse-menu-complete backward-delete-word backward-delete-char vi-backward-char vi-forward-char vi-up-line-or-history vi-down-line-or-history)
ZSH_AUTOSUGGEST_COMPLETION_IGNORE="cd *|la|la|v *"
ZSH_AUTOSUGGEST_HISTORY_IGNORE="cd *|la|la|v *"
ZSH_AUTOSUGGEST_BUFFER_MAX_SIZER=20

ZVM_VI_INSERT_ESCAPE_BINDKEY=jj
ZVM_INIT_MODE=sourcing
ZVM_LINE_INIT_MODE=$ZVM_MODE_INSERT

fpath=(~/.zsh $fpath)

HISTFILE="$HOME/.zsh_history"
HISTSIZE=10000000
SAVEHIST=10000000
HISTORY_IGNORE="(ls|cd|pwd|exit|cd|la|v)*"
HIST_STAMPS="yyyy-mm-dd"
setopt EXTENDED_HISTORY      # Write the history file in the ':start:elapsed;command' format.
setopt INC_APPEND_HISTORY    # Write to the history file immediately, not when the shell exits.
setopt SHARE_HISTORY         # Share history between all sessions.
setopt HIST_IGNORE_DUPS      # Do not record an event that was just recorded again.
setopt HIST_IGNORE_ALL_DUPS  # Delete an old recorded event if a new event is a duplicate.
setopt HIST_IGNORE_SPACE     # Do not record an event starting with a space.
setopt HIST_SAVE_NO_DUPS     # Do not write a duplicate event to the history file.
setopt HIST_VERIFY           # Do not execute immediately upon history expansion.
setopt APPEND_HISTORY        # append to history file (Default)
setopt HIST_NO_STORE         # Don't store history commands
setopt HIST_REDUCE_BLANKS    # Remove superfluous blanks from each command line being added to the history.
setopt PUSHDSILENT

if [ "$SSH_AUTH_SOCK" = "" -a -x /usr/bin/ssh-agent ]; then
              eval `/usr/bin/ssh-agent`
fi

export MANPAGER="nvim +Man!"

alias v="nvim"                                                                                       # v         = nvim
alias nixc="pushd $HOME/nixos-config && v && popd"                                                # nixc      = NixOS system config
alias la="ls -a --color=auto"                                                                        # la        = list all
alias ls="ls --color=auto"                                                                           # ls        = list
alias lg="lazygit"
alias aliases="cat ~/.zshrc | grep ^alias"                                                           # aliases

alias tm="wezterm cli spawn --new-window"    # New WezTerm window
alias ts="wezterm cli split-pane"            # Split current pane
alias tt="wezterm cli spawn"                 # New tab in current window

export PATH=$PATH:$HOME/.local/scripts
export PATH=$PATH:$HOME/.local/bin
export PATH=$PATH:$HOME/bin
export PATH=$PATH:/opt/nvim-linux64/bin
export PATH=$PATH:$HOME/google-cloud-sdk/bin
export PATH=$PATH:/opt/lua-language-server/bin
export PATH=$PATH:$HOME/.cargo/bin

export FZF_DEFAULT_COMMAND='ag --hidden -g""'

# Language version segments with update indicators.
# Cache is written by the check-lang-versions systemd timer (every 6h).
_VER_CACHE="$HOME/.cache/version-checks"

# Walk up the directory tree looking for any of the given filenames.
function _in_project() {
  local f dir
  for f in "$@"; do
    dir=$PWD
    while [[ $dir != / ]]; do
      [[ -f $dir/$f ]] && return 0
      dir=${dir:h}
    done
    [[ -f /$f ]] && return 0
  done
  return 1
}

# Print ' ↑' if the installed version differs from the cached latest.
function _update_tag() {
  local name=$1 current=$2 cache="$_VER_CACHE/${1}.latest"
  [[ -f $cache ]] || return
  local latest=$(<$cache)
  [[ -n $latest && $current != $latest ]] && printf ' ↑'
}

function prompt_node_ver() {
  _in_project package.json .nvmrc .node-version || return
  command -v node >/dev/null || return
  local v
  v=$(node --version 2>/dev/null) || return
  v=${v#v}
  p10k segment -f $green -i '󰎙' -t "${v}$(_update_tag node $v)"
}

function prompt_python_ver() {
  _in_project pyproject.toml setup.py setup.cfg Pipfile .python-version || return
  command -v python3 >/dev/null || return
  local v
  v=$(python3 --version 2>/dev/null | awk '{print $2}') || return
  [[ -z $v ]] && return
  p10k segment -f $yellow -i '󰌠' -t "${v}$(_update_tag python $v)"
}

function prompt_rust_ver() {
  _in_project Cargo.toml || return
  command -v rustc >/dev/null || return
  local v
  v=$(rustc --version 2>/dev/null | awk '{print $2}') || return
  [[ -z $v ]] && return
  p10k segment -f $orange -i '󱘗' -t "${v}$(_update_tag rust $v)"
}

function prompt_go_ver() {
  _in_project go.mod || return
  command -v go >/dev/null || return
  local v
  v=$(go version 2>/dev/null | awk '{print $3}') || return
  v=${v#go}
  [[ -z $v ]] && return
  p10k segment -f $aqua -i '󰟓' -t "${v}$(_update_tag go $v)"
}

# Print available updates for language runtimes active in the current project.
function vup() {
  local found=0
  _vup_check() {
    local name=$1 current=$2 cache="$_VER_CACHE/${1}.latest"
    [[ -f $cache ]] || return
    local latest=$(<$cache)
    [[ -n $latest && $latest != null && $current != $latest ]] || return
    printf "%-8s %s → %s\n" "$name" "$current" "$latest"
    found=1
  }
  if _in_project package.json .nvmrc .node-version && command -v node >/dev/null; then
    local v=$(node --version 2>/dev/null); _vup_check node "${v#v}"
  fi
  if _in_project pyproject.toml setup.py setup.cfg Pipfile .python-version && command -v python3 >/dev/null; then
    local v=$(python3 --version 2>/dev/null | awk '{print $2}'); _vup_check python "$v"
  fi
  if _in_project Cargo.toml && command -v rustc >/dev/null; then
    local v=$(rustc --version 2>/dev/null | awk '{print $2}'); _vup_check rust "$v"
  fi
  if _in_project go.mod && command -v go >/dev/null; then
    local v=$(go version 2>/dev/null | awk '{print $3}'); _vup_check go "${v#go}"
  fi
  (( found )) || echo "All language runtimes up to date."
}

# Sub-second command timing for the prompt (µs / ms / s).
zmodload zsh/datetime  # provides EPOCHREALTIME

_cmd_start=
_cmd_duration=

function _timer_preexec() { _cmd_start=$EPOCHREALTIME }

function _timer_precmd() {
  if [[ -n $_cmd_start ]]; then
    local -F elapsed=$(( EPOCHREALTIME - _cmd_start ))
    _cmd_duration=$(( int(elapsed * 1000000) ))
    _cmd_start=
  else
    _cmd_duration=
  fi
}

autoload -Uz add-zsh-hook
add-zsh-hook preexec _timer_preexec
add-zsh-hook precmd  _timer_precmd

# p10k custom segment — called as "cmd_time" in POWERLEVEL9K_RIGHT_PROMPT_ELEMENTS.
function prompt_cmd_time() {
  [[ -z $_cmd_duration ]] && return
  local d=$_cmd_duration text
  if   (( d < 1000 ));       then text="${d}µs"
  elif (( d < 1000000 ));    then text="$(( d / 1000 ))ms"
  elif (( d < 60000000 ));   then text="$(( d / 1000000 )).$(printf '%03d' $(( (d % 1000000) / 1000 )))s"
  else
    local s=$(( d / 1000000 ))
    text=""
    (( s >= 86400 )) && text+="$(( s / 86400 ))d "  && s=$(( s % 86400 ))
    (( s >= 3600  )) && text+="$(( s / 3600  ))h "  && s=$(( s % 3600  ))
    (( s >= 60    )) && text+="$(( s / 60    ))m "  && s=$(( s % 60    ))
    text+="${s}s"
  fi
  p10k segment -f $yellow -t "$text"
}
